services:
  postgres:
    image: postgres:16-alpine
    container_name: agente-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agente_cleexs
    ports:
      - "5433:5432"
    volumes:
      - agente_pg_data:/var/lib/postgresql/data

volumes:
  agente_pg_data:
